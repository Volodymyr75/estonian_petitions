name: Daily MotherDuck Sync

on:
  schedule:
    - cron: '0 7 * * *' # Run at 07:00 UTC daily
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests duckdb pydantic python-dotenv
        
    - name: Run ETL Sync Script
      id: sync_script
      env:
        MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        DB_PATH: md:estonia_petitions
      run: |
        python etl/daily_sync.py

    - name: Send Telegram Notification (Success)
      if: success()
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: |
          🟢 *Estonian Civic Analytics*
          Daily MotherDuck Sync completed successfully\!

    - name: Send Telegram Notification (Failure)
      if: failure()
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: |
          🔴 *Estonian Civic Analytics*
          ERROR: Daily MotherDuck Sync FAILED\!
          Review logs here: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
